<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>jerryxf</title>
    <meta name="description" content="Hi there, I'm Jerry." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#fbfaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#101010" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/favicon.jpeg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="jerryxf" />
    <meta property="og:description" content="Hi there, I'm Jerry." />
    <meta property="og:url" content="https://jerryxf.net/" />
    <meta property="og:image" content="https://jerryxf.net/favicon.jpeg" />
    <meta property="og:site_name" content="jerryxf" />

    <!-- Theme init runs synchronously before first paint to fix FOUC (Flash of Unstyled Content) problem -->
    <!--suppress ES6ConvertVarToLetConst -->
    <script>

        (function () {
            var stored = null;
            try {
                stored = localStorage.getItem("themeName");
            } catch (e) {
            }
            var pref = (stored === "default" || stored === "night" || stored === "auto")
                ? stored : "default";
            var theme = pref === "auto" || pref === "default"
                ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "night" : "default")
                : pref;
            document.documentElement.setAttribute("data-theme", theme);

            // Firefox paints before external CSS resolves custom properties,
            // so set bg color inline to cover the gap
            document.documentElement.style.background = theme === "night" ? "#101010bf" : "#fbfaf9";
        })();
    </script>

    <link rel="preconnect" href="https://github-stats.jerryxf.net" crossorigin>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
