<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>jerryxf</title>
    <meta name="description" content="Hi there, I'm Jerry." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#fbfaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#101010" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/favicon.jpeg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="jerryxf" />
    <meta property="og:description" content="Hi there, I'm Jerry." />
    <meta property="og:url" content="https://jerryxf.net/" />
    <meta property="og:image" content="https://jerryxf.net/favicon.jpeg" />
    <meta property="og:site_name" content="jerryxf" />

    <!-- Theme init runs synchronously before first paint to fix FOUC (Flash of Unstyled Content) -->
    <script>
        (function () {
            let stored = null;
            try {
                stored = localStorage.getItem("themeName");
            } catch (e) {
            }
            const pref = (stored === "default" || stored === "night" || stored === "auto")
                ? stored : "default";

            let theme;
            if (pref === "night") theme = "night";
            else if (pref === "default") theme = "default";
            else theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "night" : "default"; // auto

            document.documentElement.setAttribute("data-theme", theme);
            // Firefox paints before external CSS resolves custom properties, so cover the gap inline
            document.documentElement.style.background = theme === "night" ? "#101010" : "#fbfaf9";
        })();
    </script>

    <link rel="preconnect" href="https://github-stats.jerryxf.net" crossorigin>
</head>
<body>
<div id="boot-overlay" style="position: fixed; inset: 0; z-index: 9999; pointer-events: none; background: #000; opacity: 0.20;"></div>
<div id="root"></div>
<script>
    (function () {
        const ov = document.getElementById("boot-overlay");
        if (!ov) return;
        // overlay starts dimmed; brighten once content has rendered
        setTimeout(function () {
            ov.style.transition = "opacity 1s ease-out";
            ov.style.opacity = "0";
            setTimeout(function () {
                ov.remove();
            }, 1100);
        }, 250);
    })();
</script>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
